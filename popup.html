<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSolve Assistant Pro</title>
<style>
:root {
  /* Base colors */
  --bg-primary: #0a0f1d;
  --bg-card: linear-gradient(145deg, rgba(23, 35, 58, 0.95), rgba(15, 23, 42, 0.98));
  --border-glow: rgba(59, 130, 246, 0.4);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --accent-blue: #3b82f6;
  --accent-blue-hover: #60a5fa;
  --accent-red: #ef4444;
  --accent-red-hover: #f87171;
  --success: #10b981;
  --warning: #f59e0b;
  
  /* Effects */
  --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 25px rgba(59, 130, 246, 0.25);
  --shadow-intense: 0 20px 40px rgba(0, 0, 0, 0.5);
  --blur: blur(20px);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition-fast: 0.2s var(--ease-out);
  --transition-smooth: 0.4s var(--ease-out);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 280px;
  min-height: 320px;
  background: var(--bg-primary);
  background-image: 
    radial-gradient(ellipse at top, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at bottom, rgba(16,185,129,0.06) 0%, transparent 60%);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: var(--text-primary);
  padding: 18px;
  line-height: 1.5;
  overflow: hidden;
}

/* Soft animated background */
body::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle at 30% 20%, rgba(59,130,246,0.12) 0%, transparent 40%),
              radial-gradient(circle at 70% 80%, rgba(16,185,129,0.08) 0%, transparent 45%);
  animation: float 15s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}
@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(2%, 2%) scale(1.02); }
  66% { transform: translate(-1%, 3%) scale(0.98); }
}

.popup {
  background: var(--bg-card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: var(--shadow-soft), var(--shadow-glow);
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  overflow: hidden;
  transition: var(--transition-smooth);
}

/* Edge shimmer effect */
.popup::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { left: -100%; }
  50% { left: 100%; }
}

/* Header with logo */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.header-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-hover));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(59,130,246,0.4);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
  50% { box-shadow: 0 6px 20px rgba(59,130,246,0.7); }
}

.header-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.2px;
  background: linear-gradient(135deg, #fff, var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Professional toggle button */
.toggle-btn {
  width: 100%;
  padding: 14px 18px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-hover));
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: var(--transition-smooth);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.45);
  position: relative;
  overflow: hidden;
  isolation: isolate;
}

.toggle-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
  z-index: -1;
}
.toggle-btn:hover::before { transform: translateX(100%); }

.toggle-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(37, 99, 235, 0.65);
}
.toggle-btn:active {
  transform: scale(0.98) translateY(-1px);
  transition-duration: 0.1s;
}
.toggle-btn:focus-visible {
  outline: 2px solid var(--accent-blue-hover);
  outline-offset: 3px;
}

/* Hidden state - red */
.toggle-btn[data-state="hidden"] {
  background: linear-gradient(135deg, var(--accent-red), var(--accent-red-hover));
  box-shadow: 0 8px 25px rgba(239, 68, 68, 0.45);
}
.toggle-btn[data-state="hidden"]:hover {
  box-shadow: 0 12px 35px rgba(239, 68, 68, 0.65);
}

/* Icons with effects */
.icon-wrapper {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  position: relative;
  flex-shrink: 0;
}

.btn-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-smooth);
  color: currentColor;
}

/* Icon transitions */
.toggle-btn[data-state="visible"] .icon--show {
  opacity: 1; transform: scale(1) rotate(0);
}
.toggle-btn[data-state="visible"] .icon--hide {
  opacity: 0; transform: scale(0.3) rotate(-180deg);
}
.toggle-btn[data-state="hidden"] .icon--show {
  opacity: 0; transform: scale(0.3) rotate(180deg);
}
.toggle-btn[data-state="hidden"] .icon--hide {
  opacity: 1; transform: scale(1) rotate(0);
}

/* Status indicator with dynamic colors */
.status {
  text-align: center;
  font-size: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  transition: var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.status.success {
  background: rgba(16, 185, 129, 0.12);
  border-color: rgba(16, 185, 129, 0.3);
  color: #6ee7b7;
}
.status.error {
  background: rgba(239, 68, 68, 0.12);
  border-color: rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}
.status.warning {
  background: rgba(245, 158, 11, 0.12);
  border-color: rgba(245, 158, 11, 0.3);
  color: #fcd34d;
}

/* Animated status dot */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  animation: blink 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

/* Footer */
.footer {
  text-align: center;
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 0.4px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.footer-badge {
  background: rgba(59,130,246,0.15);
  color: var(--accent-blue-hover);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 9px;
}

/* Element entrance animation */
.popup > * {
  animation: slideUp 0.4s var(--ease-out) backwards;
}
.popup > *:nth-child(1) { animation-delay: 0.05s; }
.popup > *:nth-child(2) { animation-delay: 0.12s; }
.popup > *:nth-child(3) { animation-delay: 0.19s; }
.popup > *:nth-child(4) { animation-delay: 0.26s; }

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Auto dark/light mode support */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f1f5f9;
    --bg-card: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(241,245,249,0.98));
    --text-primary: #1e293b;
    --text-secondary: #64748b;
  }
}
</style>
</head>

<body>
  <div class="popup" role="dialog" aria-label="AutoSolve Assistant Pro">
    
    <!-- Header with logo -->
    <header class="header">
      <div class="header-logo" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="header-title">AutoSolve Assistant</span>
    </header>

    <!-- Main toggle button -->
    <button id="toggleDashboardBtn" class="toggle-btn" data-state="visible" aria-pressed="true">
      <span class="icon-wrapper" aria-hidden="true">
        <!-- Eye icon (visible) -->
        <span class="btn-icon icon--show">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
        <!-- Crossed eye icon (hidden) -->
        <span class="btn-icon icon--hide">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </span>
      <span id="btnText">Hide Dashboard</span>
    </button>

    <!-- Dynamic status indicator -->
    <div class="status success" id="popupStatus" aria-live="polite">
      <span class="status-dot"></span>
      <span id="statusText">Connected to OneFD ✓</span>
    </div>

    <!-- Footer with version badge -->
    <footer class="footer">
      <span>AI Assistant</span>
      <span class="footer-badge">v4.2 Pro</span>
    </footer>
    
  </div>

  <script src="popup.js"></script>
</body>
</html>
